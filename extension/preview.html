<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WorldCupWatchPlace Preview</title>
    <style>
      body {
        margin: 0;
        background: #edf2f1;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 440px;
        min-height: 100vh;
      }

      .mock-map {
        position: relative;
        overflow: hidden;
        padding: 28px;
        background:
          linear-gradient(90deg, rgba(23, 32, 38, 0.06) 1px, transparent 1px) 0 0 / 88px 88px,
          linear-gradient(0deg, rgba(23, 32, 38, 0.06) 1px, transparent 1px) 0 0 / 88px 88px,
          #f9fbfa;
      }

      .mock-search {
        width: min(560px, 100%);
        border: 1px solid #dce3e8;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 12px 36px rgba(23, 32, 38, 0.10);
        padding: 16px 18px;
      }

      .mock-search strong {
        display: block;
        color: #172026;
        font-size: 18px;
      }

      .mock-search span {
        color: #66727d;
      }

      .pin {
        position: absolute;
        width: 160px;
        border: 1px solid #dce3e8;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 12px 36px rgba(23, 32, 38, 0.10);
        padding: 10px;
        color: #172026;
      }

      .pin small {
        color: #0d7f64;
        font-weight: 800;
      }

      .p1 { left: 16%; top: 34%; }
      .p2 { left: 44%; top: 55%; }
      .p3 { left: 61%; top: 25%; }

      iframe {
        width: 440px;
        height: 100vh;
        border: 0;
        border-left: 1px solid #dce3e8;
        background: #f7faf9;
      }

      @media (max-width: 820px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .mock-map {
          min-height: 280px;
        }

        iframe {
          width: 100%;
          height: 760px;
          border-left: 0;
          border-top: 1px solid #dce3e8;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="mock-map" aria-label="Mock Google Maps surface">
        <div class="mock-search">
          <strong>sports bar near me</strong>
          <span>Mock Google Maps/Search surface with extension side panel</span>
        </div>
        <div class="pin p1"><small>Confirmed</small><br>The Local Tap</div>
        <div class="pin p2"><small>Likely</small><br>Northside Public House</div>
        <div class="pin p3"><small>Watch Party</small><br>Stadium Social</div>
      </section>
      <iframe src="sidepanel.html" title="WorldCupWatchPlace side panel preview"></iframe>
    </div>
  </body>
</html>
